<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產品碳足跡計算助理 Product Carbon Footprint Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<style>
  :root{
    --bg:#ffffff; --paper:#fafaf7; --panel:#ffffff;
    --line:#e5e7eb; --line2:#d1d5db;
    --ink:#1a1d1a; --ink2:#4b5563; --ink3:#6b7280; --ink4:#9ca3af;
    --leaf:#2d6a4f; --leaf-dark:#1b4332; --leaf-light:#d8f3dc; --leaf-bg:#f1f8f4;
    --amber:#b45309; --amber-bg:#fffbeb;
    --serif:'Fraunces',Georgia,serif; --sans:'Noto Sans TC',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.6}
  body{min-height:100vh;background:linear-gradient(180deg,#fafaf7 0%,#ffffff 200px)}
  .wrap{max-width:1080px;margin:0 auto;padding:44px 28px 80px}
  .mast{border-bottom:2px solid var(--ink);padding-bottom:24px;margin-bottom:32px;
    display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .mast h1{font-family:var(--serif);font-weight:600;font-size:36px;letter-spacing:-.5px;line-height:1.15;color:var(--ink)}
  .mast h1 em{font-style:italic;color:var(--leaf)}
  .mast h1 .en{display:block;font-size:16px;font-weight:400;font-style:italic;color:var(--ink3);margin-top:6px;letter-spacing:0}
  .mast .sub{color:var(--ink3);font-size:12px;margin-top:10px;font-family:var(--mono);letter-spacing:.2px}
  .badge{font-family:var(--mono);font-size:11px;color:var(--leaf);border:1.5px solid var(--leaf);
    padding:8px 14px;border-radius:2px;background:var(--leaf-bg);white-space:nowrap;font-weight:600;letter-spacing:.5px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:840px){.grid{grid-template-columns:1fr}.wrap{padding:30px 18px 60px}.mast h1{font-size:27px}.mast h1 .en{font-size:14px}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:24px;
    box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card h2{font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:4px;color:var(--ink);
    display:flex;align-items:center;gap:10px}
  .step{font-family:var(--mono);font-size:12px;color:#fff;background:var(--leaf);font-weight:600;
    width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .hint{color:var(--ink2);font-size:12.5px;margin:8px 0 16px;line-height:1.6}
  .hint .en{color:var(--ink4);font-style:italic;display:block;margin-top:2px}
  label{display:block;font-size:12px;color:var(--ink2);margin-bottom:7px;font-weight:600;letter-spacing:.2px;text-transform:uppercase}
  input[type=text],input[type=number]{width:100%;background:#fff;border:1.5px solid var(--line2);
    color:var(--ink);padding:13px 14px;border-radius:3px;font-family:var(--mono);font-size:14px;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--leaf)}
  input::placeholder{color:var(--ink4);font-family:var(--sans);font-size:13px}
  .matches{margin-top:14px;display:flex;flex-direction:column;gap:10px}
  .match{padding:14px 16px;border:1.5px solid var(--line);border-radius:4px;cursor:pointer;
    transition:all .15s;background:#fff;position:relative}
  .match:hover{border-color:var(--leaf);background:var(--leaf-bg)}
  .match.sel{border-color:var(--leaf);background:var(--leaf-bg);border-width:2px}
  .match.sel:before{content:"✓";position:absolute;top:10px;right:14px;color:var(--leaf);font-weight:700;font-size:16px}
  .match .rank{font-family:var(--mono);font-size:10px;color:var(--leaf);background:var(--leaf-light);
    padding:2px 7px;border-radius:2px;display:inline-block;margin-bottom:6px;font-weight:600;letter-spacing:.5px}
  .match .rank.alt{color:var(--ink3);background:#f3f4f6}
  .match .rank.dis{color:#fff;background:var(--leaf)}
  .match .tt{font-size:14.5px;color:var(--ink);line-height:1.4;font-weight:500;padding-right:24px}
  .match .tt-sub{font-size:12px;color:var(--ink3);font-style:italic;margin-top:2px;font-family:var(--mono);line-height:1.4}
  .disambig-head{padding:12px 14px;background:var(--leaf-bg);border:1.5px solid var(--leaf);
    border-radius:4px;margin-bottom:6px}
  .disambig-head strong{display:block;color:var(--leaf-dark);font-size:13px;line-height:1.5}
  .disambig-head .en{display:block;color:var(--ink3);font-size:11.5px;font-style:italic;margin-top:3px}
  .match .meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .match .cc{font-family:var(--mono);font-size:11.5px;color:var(--ink3)}
  .match .ef{font-family:var(--mono);font-size:14px;color:var(--leaf-dark);font-weight:600}
  .match .ef small{color:var(--ink3);font-weight:400;margin-left:3px}
  .empty{padding:24px 14px;text-align:center;color:var(--ink3);font-size:12.5px;border:1.5px dashed var(--line);border-radius:4px}
  .empty .en{color:var(--ink4);font-style:italic;display:block;margin-top:4px}
  .quick-cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
  .qc{font-family:var(--sans);font-size:12.5px;padding:7px 14px;border:1.5px solid var(--leaf);
    background:#fff;color:var(--leaf-dark);border-radius:20px;cursor:pointer;transition:all .12s;font-weight:500}
  .qc:hover{background:var(--leaf-bg)}
  .opt{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11.5px;padding:8px 12px;border:1.5px solid var(--line2);
    border-radius:2px;cursor:pointer;color:var(--ink2);background:#fff;transition:all .12s}
  .chip:hover{border-color:var(--leaf)}
  .chip.on{border-color:var(--leaf);color:var(--leaf-dark);background:var(--leaf-bg);font-weight:600}
  .usecase{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
  @media(max-width:640px){.usecase{grid-template-columns:1fr}}
  .uc{border:1.5px solid var(--line2);background:#fff;border-radius:4px;padding:14px;cursor:pointer;transition:all .12s}
  .uc:hover{border-color:var(--leaf)}
  .uc.on{border-color:var(--leaf);background:var(--leaf-bg);border-width:2px}
  .uc-t{font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:6px;line-height:1.4}
  .uc.on .uc-t{color:var(--leaf-dark)}
  .uc-d{font-size:11.5px;color:var(--ink3);line-height:1.55}
  .uc-d b{color:var(--leaf);font-family:var(--mono);font-weight:600}
  .usecase-note{margin-top:10px;font-size:11.5px;color:var(--ink3);line-height:1.55;
    padding:8px 12px;background:#fafaf7;border-left:3px solid var(--ink4);border-radius:2px}
  .usecase-note .en{display:block;color:var(--ink4);font-style:italic;font-size:11px;margin-top:2px}
  .out{grid-column:1/-1}
  .hero{background:var(--leaf-bg);border:2px solid var(--leaf);border-radius:4px;padding:36px;text-align:center}
  .hero .lbl{font-family:var(--mono);font-size:11.5px;color:var(--leaf-dark);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
  .hero .big{font-family:var(--serif);font-size:64px;font-weight:600;color:var(--leaf-dark);margin:8px 0 4px;letter-spacing:-1px;line-height:1}
  @media(max-width:840px){.hero .big{font-size:46px}}
  .hero .unit{font-family:var(--mono);font-size:14px;color:var(--leaf);font-weight:600}
  .hero .ctx{color:var(--ink2);font-size:13.5px;margin-top:16px;line-height:1.7}
  .hero .ctx b{color:var(--ink);font-weight:600}
  .calc{margin-top:20px;background:#fff;border:1.5px solid var(--line);border-radius:3px;
    font-family:var(--mono);font-size:13.5px;overflow:hidden}
  .plain{margin-top:18px;background:#fafaf7;border:1px solid var(--line);border-left:4px solid var(--leaf);
    border-radius:3px;padding:16px 20px;font-size:13.5px;line-height:1.75;color:var(--ink2)}
  .plain strong{color:var(--leaf-dark);font-weight:600}
  .plain b{color:var(--ink);font-weight:600}
  .plain .en{display:block;color:var(--ink3);font-style:italic;font-size:12px;margin-top:8px;line-height:1.6}
  .calc .cr{display:flex;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--line);gap:10px}
  .calc .cr:last-child{border-bottom:0;background:var(--leaf-bg);color:var(--leaf-dark);font-weight:700;font-size:14.5px}
  .calc .cr span:first-child{color:var(--ink2)}
  .calc .cr span:last-child{color:var(--ink);font-weight:600;white-space:nowrap}
  .calc .cr:last-child span:first-child{color:var(--leaf-dark)}
  .bench{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
  @media(max-width:840px){.bench{grid-template-columns:1fr}}
  .bcard{background:#fff;border:1.5px solid var(--line);border-radius:3px;padding:18px 14px;text-align:center}
  .bcard .bv{font-family:var(--serif);font-size:28px;color:var(--amber);font-weight:600;line-height:1.1}
  .bcard .bl{font-size:11.5px;color:var(--ink2);margin-top:8px;line-height:1.5}
  .bcard .bl .en{color:var(--ink4);font-style:italic;font-size:10.5px;display:block}
  .note{grid-column:1/-1;background:var(--amber-bg);border:1px solid #fde68a;border-left:4px solid var(--amber);border-radius:3px;padding:22px 24px}
  .note h3{font-family:var(--serif);font-size:16px;margin-bottom:14px;color:var(--amber);font-weight:600}
  .note ul{list-style:none;font-size:13px;color:var(--ink2);line-height:1.75}
  .note li{padding-left:0;margin-bottom:12px}
  .note li:last-child{margin-bottom:0}
  .note .en{display:block;color:var(--ink3);font-style:italic;font-size:12px;margin-top:3px}
  .note li b{color:var(--ink);font-weight:600}
  .tag{font-family:var(--mono);font-size:10.5px;color:#fff;background:var(--amber);
    padding:2px 8px;border-radius:2px;margin-right:6px;font-weight:600;letter-spacing:.3px;display:inline-block;vertical-align:1px}
  .rec{grid-column:1/-1;background:#fff;border:1px solid var(--line);border-radius:4px;padding:26px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .rec h2{font-family:var(--serif);font-size:19px;margin-bottom:16px;color:var(--ink);font-weight:600}
  .rec .ri{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--line)}
  .rec .ri:last-child{border-bottom:0;padding-bottom:0}
  .rec .rn{font-family:var(--mono);font-size:12px;color:#fff;background:var(--leaf);font-weight:600;
    flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .rec .rt{font-size:13.5px;color:var(--ink2);line-height:1.65}
  .rec .rt b{color:var(--ink);font-weight:600}
  .rec .rt .en{display:block;color:var(--ink4);font-style:italic;font-size:12px;margin-top:2px}
  .foot{grid-column:1/-1;color:var(--ink3);font-size:11px;font-family:var(--mono);
    text-align:center;border-top:1px solid var(--line);padding-top:24px;line-height:1.9}
  .ph{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--ink3);
    background:var(--paper);border:1px dashed var(--line2);border-radius:4px}
  .ph .pi{font-size:36px;margin-bottom:12px;color:var(--ink4)}
  .ph p{font-size:13.5px;line-height:1.7}
  .ph p .en{display:block;color:var(--ink4);font-style:italic;font-size:12px;margin-top:4px}
</style>
</head>

<script type="text/babel">
const {useState,useMemo,useEffect} = React;

function norm(s){return (s||"").toLowerCase().trim();}

// 查 NAICS 細項：依 code 取回完整 entry
function byCode(code){ return NAICS_DATA.find(d=>d.code===code); }

// 將歧義選項補上完整 NAICS 資料
function buildDisambig(term){
  const opts = ZH_DISAMBIG[term];
  if(!opts) return null;
  return opts.map(o=>{
    const d = byCode(o.code);
    if(!d) return null;
    return {...d, label: o.label};
  }).filter(Boolean);
}

// 主搜尋：回傳 { mode: 'disambig'|'normal', items: [...], origTerm }
function search(q){
  const raw = q.trim();
  if(!raw) return {mode:'empty', items:[]};

  // 第一階段：精確歧義詞檢查
  if(ZH_DISAMBIG[raw]){
    return {mode:'disambig', items: buildDisambig(raw), origTerm: raw};
  }
  // 也處理含歧義詞的子字串（如「碳粉匣」也算歧義「碳粉」）
  for(const term of Object.keys(ZH_DISAMBIG)){
    if(term.length >= 2 && raw === term + "匣"){
      return {mode:'disambig', items: buildDisambig(term), origTerm: term};
    }
  }

  const n = norm(raw);
  let terms = new Set();
  if(/[\u4e00-\u9fff]/.test(raw)){
    const keys = Object.keys(ZH_MAP).sort((a,b)=>b.length-a.length);
    let remain = raw;
    keys.forEach(k=>{
      if(remain.includes(k)){
        ZH_MAP[k].split(" ").forEach(w=>terms.add(w.toLowerCase()));
        remain = remain.split(k).join("");
      }
    });
    if(terms.size===0) return {mode:'empty', items:[]};
  } else {
    terms.add(n);
    n.split(/\s+/).filter(w=>w.length>1).forEach(w=>terms.add(w));
  }
  const termArr = [...terms];

  const scored = NAICS_DATA.map(d=>{
    const t = norm(d.title);
    const tWords = t.split(/[\s,()/&\-]+/).filter(Boolean);
    let sc = 0;
    termArr.forEach(term=>{
      if(!term) return;
      const longEnough = term.length >= 4;
      if(t === term) sc += 200;
      else if(tWords.includes(term)) sc += 80;
      else if(longEnough && tWords.some(w=>w.startsWith(term))) sc += 50;
      else if(longEnough && t.startsWith(term)) sc += 45;
      else if(longEnough && t.includes(term)) sc += 20;
      else if(term.length>2 && d.code.startsWith(term)) sc += 25;
    });
    if(/\b(other|miscellaneous|all other)\b/i.test(d.title)) sc -= 10;
    return {...d, sc};
  }).filter(d=>d.sc>0);

  scored.sort((a,b)=> b.sc - a.sc || a.title.length - b.title.length);
  const top = scored.filter(d=>d.sc>=40).slice(0,2);
  if(top.length===2 && top[1].sc < top[0].sc*0.5) return {mode:'normal', items:[top[0]]};
  return {mode:'normal', items: top};
}

  const kg = usd*factor;

      </div>
      <div className="badge">支出基礎法 SPEND-BASED EEIO</div>
    </div>

    <div className="grid">
      <div className="card">
        <h2><span className="step">1</span>產品項目 Product Item</h2>
        <div className="hint">
          輸入中文或英文（如：咖啡、塑膠、汽車零件、computer），系統會挑選最接近的 1–2 項供確認。
          <span className="en">Enter a product in Chinese or English. The closest 1–2 NAICS categories will be shown.</span>
        </div>
        <input type="text" value={q} placeholder="例 e.g. 咖啡 / 紙箱 / 半導體 / steel"
          onChange={e=>setQ(e.target.value)} />

        <div className="matches">
          {q && results.length===0 &&
            <div className="empty">
              <div style={{fontSize:'13px',color:'var(--ink)',marginBottom:'6px',fontWeight:600}}>
                「{q}」未在內建詞庫中
              </div>
              <div style={{color:'var(--ink3)',marginBottom:14}}>
                可改用更通用的中英文詞，或從常見企業採購大類選擇：
                <span className="en">Not in dictionary. Try a broader term, or pick a common procurement category:</span>
              </div>
              <div className="quick-cats">
                {["廚具","餐具","家用品","蔬菜","水果","牛肉","海鮮","油","糖","3C","化妝品","制服","文宣品","廣告","太陽能板","無人機","木板","電風扇","印表機耗材","辦公文具","包裝","清潔用品","電池","紙","服裝","家具","家電","藥品","化學品"].map(c=>(
                  <button key={c} className="qc" onClick={()=>setQ(c)}>{c}</button>
                ))}
              </div>
            </div>}
          {!q && results.length===0 &&
            <div className="empty">開始輸入產品名稱…<span className="en">Start typing…</span></div>}

          {isDisambig && results.length > 0 &&
            <div className="disambig-head">
              <strong>「{searchResult.origTerm}」可能對應多種產品 — 請選擇最接近者</strong>
              <span className="en">"{searchResult.origTerm}" matches multiple products — pick the closest one</span>
            </div>}

          {results.map((r,i)=>(
            <div key={r.code} className={"match"+(sel&&sel.code===r.code?" sel":"")}
                 onClick={()=>setSel(r)}>
              <span className={"rank"+(isDisambig ? " dis" : (i>0?" alt":""))}>
                {isDisambig
                  ? `選項 ${i+1} OPTION ${i+1}`
                  : (i===0 ? "最佳匹配 BEST MATCH" : "備選 ALTERNATIVE")}
              </span>
              <div className="tt">{r.label || r.title}</div>
              {r.label && <div className="tt-sub">{r.title}</div>}
              <div className="meta">
                <span className="cc">NAICS {r.code}</span>
                <span className="ef">{r.wm}<small>kg CO₂e/USD</small></span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <h2><span className="step">2</span>採購金額與參數 Amount &amp; Parameters</h2>
        <div className="hint">
          輸入該產品的台幣採購金額。匯率預設採 2022 年均值，與排放係數計價基準年一致（最嚴謹）。
          <span className="en">Enter the purchase amount in TWD. Default FX uses the 2022 average, matching the factor base year.</span>
        </div>
        <label>{useCase==="buyer"?"採購金額 Purchase Amount":"出貨/銷售金額 Sales / Output Amount"}（新台幣 TWD）</label>
        <input type="number" value={amt} placeholder="例 e.g. 50000"
          onChange={e=>setAmt(e.target.value)} />

        <label style={{marginTop:18}}>匯率基準 FX Rate (TWD per 1 USD)</label>
        <div className="opt">
          {Object.keys(RATES).map(k=>(
            <div key={k} className={"chip"+(rateKey===k?" on":"")}
              onClick={()=>setRateKey(k)}>{RATES[k].v} · {RATES[k].label}</div>
          ))}
          <div className={"chip"+(rateKey==="custom"?" on":"")}
            onClick={()=>setRateKey("custom")}>自訂 Custom</div>
        </div>
        {rateKey==="custom" &&
          <input type="number" style={{marginTop:10}} value={customRate}
            placeholder="輸入自訂匯率 Enter rate, e.g. 31.5"
            onChange={e=>setCustomRate(e.target.value)} />}

        <label style={{marginTop:18}}>使用情境 Use Case</label>
        <div className="usecase">
          <div className={"uc"+(useCase==="buyer"?" on":"")} onClick={()=>setUseCase("buyer")}>
            <div className="uc-t">採購方 BUYER</div>
            <div className="uc-d">你付款的金額（含通路加成）<br/>含通路、運輸排放 · uses <b>with margins</b></div>
          </div>
          <div className={"uc"+(useCase==="seller"?" on":"")} onClick={()=>setUseCase("seller")}>
            <div className="uc-t">販售方 SELLER<br/><span style={{fontWeight:400,fontSize:'11px',color:'var(--ink3)'}}>(製造商視角 Manufacturer only)</span></div>
            <div className="uc-d">你出貨收款的金額（出廠價）<br/>僅製造端排放 · uses <b>without margins</b></div>
          </div>
        </div>
        <div className="usecase-note">
          ⓘ 通路商／經銷商／零售商計算自家業務時，仍應選「採購方」（進貨亦為含加成價格）。
          <span className="en">Distributors/retailers should still pick BUYER for their own procurement calculations.</span>
        </div>
      </div>

      {!ready &&
        <div className="ph">
          <div className="pi">◷</div>
          <p>完成「選擇產品類別」與「輸入採購金額」後，將自動計算碳足跡。
            <span className="en">Select a product and enter the amount to calculate.</span>
          </p>
        </div>}

      {ready && <>
        <div className="out">
          <div className="hero">
            <div className="lbl">估計產品碳足跡 · Estimated Product Carbon Footprint</div>
            <div className="big">{kg.toLocaleString('en-US',{maximumFractionDigits:1})}</div>
            <div className="unit">kg CO₂e</div>
            <div className="ctx">
              <b>{sel.title}</b>（NAICS {sel.code}）<br/>
              ≈ {(kg/1000).toLocaleString('en-US',{maximumFractionDigits:3})} 公噸 tonnes CO₂e
            </div>
          </div>

          <div className="plain">
            <strong>白話說明 Plain-language interpretation：</strong>
            {useCase==="buyer" ? <>
              【採購方視角】每<b>採購</b> 1 美元（2022 幣值）的「{sel.title}」，<b>含通路加成的</b>供應鏈平均產生約 <b>{factor} 公斤</b> CO₂e。
              本次採購 <b>NT$ {twd.toLocaleString()}</b>（≈ US$ {usd.toLocaleString('en-US',{maximumFractionDigits:2})}），對應供應鏈總碳排 <b>{kg.toLocaleString('en-US',{maximumFractionDigits:1})} kg CO₂e</b>。
              <span className="en">[Buyer view] Each USD spent on this category (purchaser price, incl. trade/transport margins) produces ~{factor} kg CO₂e on average. Total: {kg.toLocaleString('en-US',{maximumFractionDigits:1})} kg CO₂e.</span>
            </> : <>
              【販售方視角·製造商】每<b>出貨</b> 1 美元（2022 幣值出廠價）的「{sel.title}」，<b>製造端</b>供應鏈平均產生約 <b>{factor} 公斤</b> CO₂e（不含後續通路、運輸排放）。
              本次出貨 <b>NT$ {twd.toLocaleString()}</b>（≈ US$ {usd.toLocaleString('en-US',{maximumFractionDigits:2})}），對應生產端供應鏈總碳排 <b>{kg.toLocaleString('en-US',{maximumFractionDigits:1})} kg CO₂e</b>。
              <span className="en">[Seller/manufacturer view] Each USD of output (producer price) produces ~{factor} kg CO₂e at the production stage (excl. downstream distribution). Total: {kg.toLocaleString('en-US',{maximumFractionDigits:1})} kg CO₂e.</span>
            </>}
          </div>

          <div className="calc">
            <div className="cr"><span>{useCase==="buyer"?"採購金額 Purchase amount":"出貨/銷售金額 Sales amount"}</span><span>NT$ {twd.toLocaleString()}</span></div>
            <div className="cr"><span>÷ 匯率 FX rate (TWD/USD)</span><span>{rate}</span></div>
            <div className="cr"><span>= 換算美元 Converted (2022 USD)</span><span>US$ {usd.toLocaleString('en-US',{maximumFractionDigits:2})}</span></div>
            <div className="cr"><span>× 排放係數 EF（{useCase==="buyer"?"含加成·購買者價格 w/ margins, purchaser price":"不含加成·生產者價格 w/o margins, producer price"}）</span><span>{factor} kg CO₂e/USD</span></div>
            <div className="cr"><span>= 碳足跡 Carbon footprint</span><span>{kg.toLocaleString('en-US',{maximumFractionDigits:1})} kg CO₂e</span></div>
          </div>

          <div className="bench">
            <div className="bcard">
              <div className="bv">{carKm.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
              <div className="bl">公里 km<span className="en">car driving distance</span></div>
            </div>
            <div className="bcard">
              <div className="bv">{trees.toLocaleString('en-US',{maximumFractionDigits:1})}</div>
              <div className="bl">棵·年 tree-years<span className="en">tree absorption (1 yr)</span></div>
            </div>
            <div className="bcard">
              <div className="bv">{phoneCharge.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
              <div className="bl">次 charges<span className="en">smartphone full charges</span></div>
            </div>
          </div>
        </div>

        <div className="note">
          <h3>方法論與不確定性聲明（必讀）· Methodology &amp; Uncertainty Disclaimer</h3>
          <ul>
            <li><span className="tag">方法論 METHOD</span><b>採購方 vs 販售方須分別套用不同係數</b>。採購方付的是「購買者價格」（含通路加成）→ 用 with margins 係數，計入通路與運輸排放；販售方（製造商）的營收是「生產者價格」（出廠價）→ 用 without margins 係數，僅計製造端排放。錯選會造成重複計算或低估。
              <span className="en">Buyers pay purchaser price (use with margins); manufacturers receive producer price (use without margins). Mixing these will double-count or under-count.</span></li>
            <li><span className="tag">建議查證 VERIFY</span><b>跨系統引用差異</b>：本工具係數源自 <b>USEEIO Supply Chain GHG Factors v1.3.0、USD2022、purchaser price</b>，已逐筆與原始 CSV 欄位驗證一致。若其他工具或顧問報告對同一 NAICS 給出不同數字，常見原因包括：① 不同模型版本（v1.0–v1.3 之間係數會微調）② 不同貨幣基準年（USD2017／2020／2021／2022）③ 不同氣體口徑（All GHGs vs 僅 CO2）④ 對應到不同 NAICS 代碼。交叉比對時請務必確認對方資料來源版本，再判定數字孰是孰非。
              <span className="en">Cross-system discrepancies: Our factors are from USEEIO v1.3.0 / USD2022 / purchaser price, verified line-by-line. If another tool reports a different number, check their version, base-year currency, gas scope, and NAICS mapping before reconciling.</span></li>
            <li><span className="tag">推斷 INFERRED</span>本工具採<b>支出基礎環境投入產出法（Spend-based EEIO）</b>，非製程生命週期法（Process LCA）。結果為「該產業類別平均」的供應鏈碳排估計值，非特定產品的精確實測值。
              <span className="en">Uses spend-based EEIO, not process LCA. Results are industry-category averages, not product-specific measurements.</span></li>
            <li><span className="tag">資料不足 INSUFFICIENT</span>NAICS 為產業分類，同類別下不同產品共用同一係數，無法區分個別產品差異。選錯類別會顯著影響結果，請確認類別貼近實際採購標的。
              <span className="en">NAICS is an industry classification; products within a category share one factor. Wrong selection materially affects results.</span></li>
            <li><span className="tag">建議查證 VERIFY</span>排放係數以 2022 美元購買者價格計。台幣金額須先換為 2022 USD 才與係數一致；若採購發生於其他年度，建議以該年度匯率並考量通膨調整。
              <span className="en">Factors are in 2022 USD (purchaser price). For other years, use that year's FX and adjust for inflation.</span></li>
            <li><span className="tag">建議查證 VERIFY</span>等量換算（車程／樹木／充電）為常見近似參考值，僅供溝通示意，非精算結果。
              <span className="en">Equivalence figures are approximations for communication, not precise calculations.</span></li>
            <li>本法適用於<b>組織採購碳盤查、ESG 範疇三快速估算、供應商篩選排序</b>；不建議作為單一產品對外宣稱之碳足跡標籤依據（後者應採 ISO 14067 製程 LCA）。
              <span className="en">Suitable for procurement screening &amp; Scope 3 estimation; not for product-level carbon labelling (use ISO 14067 instead).</span></li>
          </ul>
        </div>

        <div className="rec">
          <h2>碳足跡管理建議 · Carbon Management Recommendations</h2>
          <div className="ri"><div className="rn">1</div><div className="rt">
            <b>熱點辨識 Hotspot identification：</b>若此類別係數偏高（&gt; 1.0 kg CO₂e/USD，常見於水泥、畜牧、金屬、化學），代表該採購為範疇三主要熱點，應優先納入減量管理與供應商議合。
            <span className="en">High factors (&gt;1.0) flag Scope 3 hotspots — prioritise for reduction and supplier engagement.</span></div></div>
          <div className="ri"><div className="rn">2</div><div className="rt">
            <b>替代採購評估 Alternative sourcing：</b>在規格可接受前提下，比較不同 NAICS 類別替代品的係數差異（例：以再生料、低碳製程或在地供應替代），量化潛在減量空間。
            <span className="en">Compare factors across substitute categories (recycled, low-carbon, local) to quantify reduction potential.</span></div></div>
          <div className="ri"><div className="rn">3</div><div className="rt">
            <b>數據升級路徑 Data upgrade path：</b>對金額占比高的前 20% 採購項目，逐步要求供應商提供實測 EPD／碳足跡，將支出基礎估算升級為一手活動數據，降低不確定性。
            <span className="en">For top 20% by spend, request supplier EPD/primary data to replace spend-based estimates.</span></div></div>
          <div className="ri"><div className="rn">4</div><div className="rt">
            <b>盤查邊界一致性 Boundary consistency：</b>同一份報告中所有品項建議統一採「含加成（購買者價格）」版本，並固定匯率基準年，確保跨品項可比與年度可追蹤。
            <span className="en">Use the with-margins version and a fixed FX base year across all items for comparability.</span></div></div>
        </div>
      </>}

      <div className="foot">
        資料來源 Source：U.S. EPA — Supply Chain Greenhouse Gas Emission Factors <b>v1.3.0</b>（NAICS-6, <b>2022 USD, purchaser price</b>）<br/>
        匯率參考 FX ref：2022 年均 1 USD = 29.782 TWD ｜ 結果為估計值，正式揭露請依適用準則查證
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
